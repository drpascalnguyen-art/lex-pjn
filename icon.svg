<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3328"/>
      <stop offset="100%" style="stop-color:#0A1F15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="240" r="140" fill="#059669" opacity="0.08"/>
  <!-- L monogram -->
  <text x="180" y="330" font-family="Georgia, serif" font-size="240" font-weight="700" fill="url(#accent)" opacity="0.95">L</text>
  <!-- Subtitle -->
  <text x="256" y="420" font-family="Georgia, serif" font-size="40" fill="#7A9E8C" text-anchor="middle" letter-spacing="12">PJN</text>
