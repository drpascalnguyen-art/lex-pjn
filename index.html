<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#22C55E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GlutenWise" />
    <meta
      name="description"
      content="GlutenWise — a beautiful PWA for people healing from gluten intolerance and celiac disease."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Playfair+Display:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />
    <title>GlutenWise — Heal Your Gut, Beautifully</title>
    <script>
      // One-time cleanup of legacy Lex PJN service worker + caches
      (function () {
        if (!('serviceWorker' in navigator)) return;
        if (localStorage.getItem('glutenwise:migrated-v2') === '1') return;
        var mustReload = false;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var jobs = regs.map(function (r) {
            var url = (r.active && r.active.scriptURL) || '';
            // Unregister anything that isn't the Workbox SW vite-plugin-pwa ships
            if (!/workbox|vite/i.test(url)) {
              mustReload = true;
              return r.unregister();
            }
            return Promise.resolve();
          });
          return Promise.all(jobs);
        }).then(function () {
          return caches.keys();
        }).then(function (keys) {
          return Promise.all(
            keys
              .filter(function (k) { return /^lex-pjn|^mp-/i.test(k); })
              .map(function (k) { mustReload = true; return caches.delete(k); })
          );
        }).then(function () {
          localStorage.setItem('glutenwise:migrated-v2', '1');
          if (mustReload) location.reload();
        }).catch(function () {});
      })();
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
