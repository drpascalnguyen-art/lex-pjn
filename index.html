function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}
function getGreeting(){const h=new Date().getHours();if(h>=5&&h<12)return"Good Morning";if(h>=12&&h<17)return"Good Afternoon";if(h>=17&&h<21)return"Good Evening";return"Rest Well";}
function formatTime(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;}
function formatDate(){return new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}
function todayStr(){return new Date().toISOString().slice(0,10);}
function miniBar(values,max){const chars="▁▂▃▄▅▆▇█";return values.map(v=>{const idx=Math.min(7,Math.round((v/max)*7));return chars[idx]||chars[0];}).join("");}

function updateStreak(gd,mode){
  const today=todayStr();const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(mode==="morning")gd.morningDone=true;
  if(mode==="evening")gd.eveningDone=true;
  if(gd.lastDate===today)return gd;
  if(gd.lastDate===yesterday){gd.streakCurrent++;}else if(gd.lastDate!==today){gd.streakCurrent=1;}
  gd.lastDate=today;
  if(gd.streakCurrent>gd.streakLongest)gd.streakLongest=gd.streakCurrent;
  return gd;
}

// ─── HEALING FREQUENCY MUSIC ENGINE ─────────────────────────────────────────────
const audioCtxRef = { current: null };
const nodesRef = { current: [] };

function createPad(ctx, freq, gain, type, detuneL, detuneR, filterFreq) {
  const merger = ctx.createChannelMerger(2);
  const oscL = ctx.createOscillator(); oscL.type = type || "sine"; oscL.frequency.value = freq + (detuneL||0);
  const oscR = ctx.createOscillator(); oscR.type = type || "sine"; oscR.frequency.value = freq + (detuneR||0);
  const gL = ctx.createGain(); gL.gain.value = gain;
  const gR = ctx.createGain(); gR.gain.value = gain;
  oscL.connect(gL); gL.connect(merger, 0, 0);
  oscR.connect(gR); gR.connect(merger, 0, 1);
  const filter = ctx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = filterFreq || 2000; filter.Q.value = 0.7;
  merger.connect(filter);
  const lfo = ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 0.15;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = gain * 0.3;
  lfo.connect(lfoGain); lfoGain.connect(gL.gain); lfoGain.connect(gR.gain);
  lfo.start(); oscL.start(); oscR.start();
  return { output: filter, nodes: [oscL, oscR, gL, gR, lfo, lfoGain, filter, merger] };
}

function startMorningFrequencies() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtxRef.current = ctx; const nodes = [];
  const master = ctx.createGain(); master.gain.value = 0.6; master.connect(ctx.destination);
  const p1 = createPad(ctx, 528, 0.06, "sine", -0.5, 0.5, 2200);
  p1.output.connect(master); nodes.push(...p1.nodes);
  const p2 = createPad(ctx, 639, 0.035, "sine", -0.3, 0.3, 1800);
  p2.output.connect(master); nodes.push(...p2.nodes);
  const p3 = createPad(ctx, 741, 0.025, "triangle", -0.4, 0.4, 1600);
  p3.output.connect(master); nodes.push(...p3.nodes);
  const sub = ctx.createOscillator(); sub.type = "sine"; sub.frequency.value = 132;
  const subG = ctx.createGain(); subG.gain.value = 0.02;
  sub.connect(subG); subG.connect(master); sub.start(); nodes.push(sub, subG);
  const pulse = ctx.createOscillator(); pulse.type = "sine"; pulse.frequency.value = 0.5;
  const pulseG = ctx.createGain(); pulseG.gain.value = 0.008;
  pulse.connect(pulseG); pulseG.connect(master.gain); pulse.start(); nodes.push(pulse, pulseG, master);
  nodesRef.current = nodes;
}

function startEveningFrequencies() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtxRef.current = ctx; const nodes = [];
  const master = ctx.createGain(); master.gain.value = 0.5; master.connect(ctx.destination);
  const p1 = createPad(ctx, 396, 0.055, "sine", -0.2, 0.2, 1200);
  p1.output.connect(master); nodes.push(...p1.nodes);
  const p2 = createPad(ctx, 432, 0.045, "sine", -0.15, 0.15, 1000);
  p2.output.connect(master); nodes.push(...p2.nodes);
  const p3 = createPad(ctx, 285, 0.03, "sine", -0.1, 0.1, 800);
  p3.output.connect(master); nodes.push(...p3.nodes);
  const sub = ctx.createOscillator(); sub.type = "sine"; sub.frequency.value = 66;
  const subG = ctx.createGain(); subG.gain.value = 0.025;
  sub.connect(subG); subG.connect(master); sub.start(); nodes.push(sub, subG);
  const lfo = ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 0.08;
  const lfoG = ctx.createGain(); lfoG.gain.value = 0.006;
  lfo.connect(lfoG); lfoG.connect(master.gain); lfo.start(); nodes.push(lfo, lfoG, master);
  nodesRef.current = nodes;
}

function stopAmbient() {
  nodesRef.current.forEach(n => { try { if (n.stop) n.stop(); else if (n.disconnect) n.disconnect(); } catch(e){} });
  nodesRef.current = [];
  if (audioCtxRef.current && audioCtxRef.current.state !== "closed") { try { audioCtxRef.current.close(); } catch(e) {} }
  audioCtxRef.current = null;
}
