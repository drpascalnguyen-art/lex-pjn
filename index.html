// ─── ZEN AMBIENT SOUND ENGINE ─────────────────────────────────────────────────
// Morning: Beta binaural beats (14Hz) + ascending zen tones + singing bowl harmonics
// Evening: Theta binaural beats (6Hz) + descending ambient pads + soft wind
const audioCtxRef = { current: null };
const nodesRef = { current: [] };
const intervalsRef = { current: [] };

function createPad(ctx, freq, gain, detune) {
  const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  const g = ctx.createGain(); g.gain.value = gain;
  osc.connect(g);
  return { osc, gain: g };
}

function createSoftNoise(ctx, vol, cutoff) {
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const output = buffer.getChannelData(0);
  let last = 0;
  for (let i = 0; i < bufferSize; i++) { const w = Math.random() * 2 - 1; last = (last + 0.02 * w) / 1.02; output[i] = last * 3.5; }
  const src = ctx.createBufferSource(); src.buffer = buffer; src.loop = true;
  const filter = ctx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = cutoff;
  const g = ctx.createGain(); g.gain.value = vol;
  src.connect(filter); filter.connect(g);
  return { src, gain: g, filter };
}

function startMorningAmbient() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtxRef.current = ctx;
  const nodes = [];

  // ── Beta binaural beat (14Hz) for focus/activation ──
  // Left ear: 200Hz, Right ear: 214Hz → 14Hz beta entrainment
  const merger = ctx.createChannelMerger(2);
  merger.connect(ctx.destination);
  const binL = ctx.createOscillator(); binL.type = "sine"; binL.frequency.value = 200;
  const binLG = ctx.createGain(); binLG.gain.value = 0.06;
  binL.connect(binLG); binLG.connect(merger, 0, 0);
  const binR = ctx.createOscillator(); binR.type = "sine"; binR.frequency.value = 214;
  const binRG = ctx.createGain(); binRG.gain.value = 0.06;
  binR.connect(binRG); binRG.connect(merger, 0, 1);
  binL.start(); binR.start();
  nodes.push(binL, binR, binLG, binRG);

  // ── Zen pad chord: C major 7th (C3-E3-G3-B3) — warm, uplifting ──
  const padFreqs = [130.81, 164.81, 196.00, 246.94];
  padFreqs.forEach((f, i) => {
    const p = createPad(ctx, f, 0.018, (i - 1.5) * 4);
    p.gain.connect(ctx.destination); p.osc.start();
    nodes.push(p.osc, p.gain);
    // Subtle vibrato
    const lfo = ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 0.15 + i * 0.05;
    const lfoG = ctx.createGain(); lfoG.gain.value = 1.5;
    lfo.connect(lfoG); lfoG.connect(p.osc.frequency);
    lfo.start(); nodes.push(lfo, lfoG);
  });

  // ── Soft airy texture (very gentle filtered noise) ──
  const air = createSoftNoise(ctx, 0.02, 250);
  air.gain.connect(ctx.destination); air.src.start();
  nodes.push(air.src, air.gain, air.filter);

  // ── Singing bowl chimes — periodic harmonic tones ──
  function singingBowl() {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") return;
    const baseFreq = [396, 528, 639, 741, 852][Math.floor(Math.random() * 5)];
    const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = baseFreq;
    const osc2 = ctx.createOscillator(); osc2.type = "sine"; osc2.frequency.value = baseFreq * 2.01;
    const g = ctx.createGain(); const g2 = ctx.createGain();
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.025, ctx.currentTime + 0.8);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 6);
    g2.gain.setValueAtTime(0, ctx.currentTime);
    g2.gain.linearRampToValueAtTime(0.008, ctx.currentTime + 0.5);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 4);
    osc.connect(g); g.connect(ctx.destination);
    osc2.connect(g2); g2.connect(ctx.destination);
    osc.start(); osc2.start();
    osc.stop(ctx.currentTime + 7); osc2.stop(ctx.currentTime + 5);
  }
  singingBowl();
  const bowlInt = setInterval(singingBowl, 8000 + Math.random() * 5000);
  intervalsRef.current.push(bowlInt);

  // ── Slow ascending arpeggio — pentatonic scale, every ~12s ──
  function zenArp() {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") return;
    const scale = [261.63, 293.66, 329.63, 392.00, 523.25];
    scale.forEach((f, i) => {
      const t = ctx.currentTime + i * 0.6;
      const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = f;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.012, t + 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 3);
    });
  }
  const arpInt = setInterval(zenArp, 15000);
  intervalsRef.current.push(arpInt);
  setTimeout(zenArp, 4000);

  nodesRef.current = nodes;
}

function startEveningAmbient() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtxRef.current = ctx;
  const nodes = [];

  // ── Theta binaural beat (6Hz) for deep calm/meditation ──
  // Left ear: 144Hz, Right ear: 150Hz → 6Hz theta entrainment
  const merger = ctx.createChannelMerger(2);
  merger.connect(ctx.destination);
  const binL = ctx.createOscillator(); binL.type = "sine"; binL.frequency.value = 144;
  const binLG = ctx.createGain(); binLG.gain.value = 0.05;
  binL.connect(binLG); binLG.connect(merger, 0, 0);
  const binR = ctx.createOscillator(); binR.type = "sine"; binR.frequency.value = 150;
  const binRG = ctx.createGain(); binRG.gain.value = 0.05;
  binR.connect(binRG); binRG.connect(merger, 0, 1);
  binL.start(); binR.start();
  nodes.push(binL, binR, binLG, binRG);

  // ── Deep ambient drone pad: A minor (A2-C3-E3) — soothing, grounding ──
  const padFreqs = [110.00, 130.81, 164.81];
  padFreqs.forEach((f, i) => {
    const p = createPad(ctx, f, 0.022, (i - 1) * 3);
    p.gain.connect(ctx.destination); p.osc.start();
    nodes.push(p.osc, p.gain);
    // Very slow vibrato
    const lfo = ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 0.08 + i * 0.02;
    const lfoG = ctx.createGain(); lfoG.gain.value = 1;
    lfo.connect(lfoG); lfoG.connect(p.osc.frequency);
    lfo.start(); nodes.push(lfo, lfoG);
  });

  // ── Warm sub-bass hum (grounding frequency) ──
  const sub = ctx.createOscillator(); sub.type = "sine"; sub.frequency.value = 55;
  const subG = ctx.createGain(); subG.gain.value = 0.025;
  sub.connect(subG); subG.connect(ctx.destination);
  sub.start(); nodes.push(sub, subG);

  // ── Soft warm breath texture ──
  const breath = createSoftNoise(ctx, 0.025, 180);
  breath.gain.connect(ctx.destination); breath.src.start();
  nodes.push(breath.src, breath.gain, breath.filter);
  // Gentle swell on the noise
  const breathLFO = ctx.createOscillator(); breathLFO.type = "sine"; breathLFO.frequency.value = 0.12;
  const breathLFOG = ctx.createGain(); breathLFOG.gain.value = 0.012;
  breathLFO.connect(breathLFOG); breathLFOG.connect(breath.gain.gain);
  breathLFO.start(); nodes.push(breathLFO, breathLFOG);

  // ── Tibetan bowl — low, resonant, every ~15s ──
  function tibetanBowl() {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") return;
    const freq = [174.61, 220, 261.63][Math.floor(Math.random() * 3)];
    const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = freq;
    const osc2 = ctx.createOscillator(); osc2.type = "sine"; osc2.frequency.value = freq * 3.01;
    const g = ctx.createGain(); const g2 = ctx.createGain();
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.02, ctx.currentTime + 1.5);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 9);
    g2.gain.setValueAtTime(0, ctx.currentTime);
    g2.gain.linearRampToValueAtTime(0.005, ctx.currentTime + 1);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 6);
    osc.connect(g); g.connect(ctx.destination);
    osc2.connect(g2); g2.connect(ctx.destination);
    osc.start(); osc2.start();
    osc.stop(ctx.currentTime + 10); osc2.stop(ctx.currentTime + 7);
  }
  tibetanBowl();
  const bowlInt = setInterval(tibetanBowl, 12000 + Math.random() * 6000);
  intervalsRef.current.push(bowlInt);

  // ── Descending wind chime — gentle pentatonic descent every ~20s ──
  function windChime() {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") return;
    const scale = [523.25, 392.00, 329.63, 261.63, 196.00];
    scale.forEach((f, i) => {
      const t = ctx.currentTime + i * 0.8;
      const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = f;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.008, t + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 4);
    });
  }
  const chimeInt = setInterval(windChime, 20000 + Math.random() * 8000);
  intervalsRef.current.push(chimeInt);
  setTimeout(windChime, 6000);

  nodesRef.current = nodes;
}

function stopAmbient() {
  intervalsRef.current.forEach(id => clearInterval(id));
  intervalsRef.current = [];
  nodesRef.current.forEach(n => { try { if (n.stop) n.stop(); else if (n.disconnect) n.disconnect(); } catch(e){} });
  nodesRef.current = [];
  if (audioCtxRef.current && audioCtxRef.current.state !== "closed") {
    try { audioCtxRef.current.close(); } catch(e) {}
  }
  audioCtxRef.current = null;
}
